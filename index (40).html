<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Face Age & Gender Recognition</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }
        #status {
            position: absolute;
            top: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10;
            letter-spacing: 1px;
            border: 1px solid #333;
        }
        .container {
            position: relative;
            width: 100%;
            max-width: 640px;
            height: 480px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            background: #000;
        }
        /* Зеркалим ТОЛЬКО видео поток */
        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); 
        }
        /* Холст НЕ зеркалим в CSS, чтобы текст не разворачивался */
        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div id="status">Инициализация системы...</div>

    <div class="container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const statusDiv = document.getElementById('status');

        const MODEL_URL = 'https://vladmandic.github.io/face-api/model/';

        async function init() {
            try {
                statusDiv.innerText = "Загрузка нейросетей...";
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
                
                statusDiv.innerText = "Доступ к веб-камере...";
                startVideo();
            } catch (err) {
                statusDiv.innerText = "Ошибка : " + err.message;
                console.error(err);
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    width: { ideal: 640 }, 
                    height: { ideal: 480 },
                    facingMode: "user" 
                } 
            })
            .then(stream => {
                video.srcObject = stream;
                statusDiv.innerText = "AR Готова. Наведите камеру на лицо.";
            })
            .catch(err => {
                statusDiv.innerText = "Камера недоступна.";
                console.error(err);
            });
        }

        video.addEventListener('play', () => {
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(
                    video, 
                    new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 })
                ).withAgeAndGender();

                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                resizedDetections.forEach(detection => {
                    const { age, gender, genderProbability } = detection;
                    const box = detection.detection.box;

                    /* МАГИЯ ЗДЕСЬ:
                      Так как видео отзеркалено, левая сторона реального кадра стала правой на экране.
                      Формула ниже разворачивает координату X графики, чтобы она идеально села на лицо.
                    */
                    const flippedX = canvas.width - box.x - box.width;

                    // Настройка стилей рамки AR
                    ctx.strokeStyle = gender === 'male' ? '#00d2ff' : '#ff007f';
                    ctx.lineWidth = 3;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = ctx.strokeStyle;

                    // Рисуем рамку по зеркальной координате X
                    ctx.strokeRect(flippedX, box.y, box.width, box.height);
                    ctx.shadowBlur = 0;

                    // Текст
                    const genderRu = gender === 'male' ? 'Мужчина' : 'Женщина';
                    const probability = Math.round(genderProbability * 100);
                    const ageRounded = Math.round(age);
                    const text = `${genderRu} (${probability}%), ${ageRounded} лет`;

                    // Плашка под текст
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                    const textWidth = ctx.measureText(text).width + 20;
                    ctx.fillRect(flippedX, box.y - 30, textWidth, 30);

                    // Вывод нормального, не отзеркаленного текста
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 14px sans-serif';
                    ctx.fillText(text, flippedX + 10, box.y - 10);
                });
            }, 100); 
        });

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
